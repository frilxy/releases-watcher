name: Releases Watcher - Server酱3

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  releases-watcher-serverchan3:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare state directory
        run: |
          mkdir -p .releases-watcher/serverchan3

      - name: Check releases and notify Server酱3
        env:
          SC3_UID: ${{ secrets.SC3_UID }}
          SC3_SENDKEY: ${{ secrets.SC3_SENDKEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request
          import urllib.parse
          import urllib.error

          REPO_FILE = pathlib.Path("releases-watcher/repos.json")
          STATE_DIR = pathlib.Path(".releases-watcher/serverchan3")
          STATE_DIR.mkdir(parents=True, exist_ok=True)

          SC3_UID = os.environ["SC3_UID"].strip()
          SC3_SENDKEY = os.environ["SC3_SENDKEY"].strip()

          GITHUB_HEADERS = {
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "releases-watcher"
          }

          def load_repos():
              data = json.loads(REPO_FILE.read_text(encoding="utf-8"))
              return [r for r in data if "/" in r]

          def get_json(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {})
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode())

          def get_latest_release(repo):
              owner, name = repo.split("/", 1)
              url = f"https://api.github.com/repos/{owner}/{name}/releases/latest"
              return get_json(url, headers=GITHUB_HEADERS)

          def send_serverchan3(title, desp):
              url = f"https://{SC3_UID}.push.ft07.com/send/{SC3_SENDKEY}.send"
              data = urllib.parse.urlencode({
                  "title": title,
                  "desp": desp
              }).encode()

              req = urllib.request.Request(url, data=data, method="POST")
              with urllib.request.urlopen(req) as resp:
                  print(resp.read().decode())

          def state_file(repo):
              return STATE_DIR / f"{repo.replace('/', '__')}.txt"

          repos = load_repos()
          updated = False

          for repo in repos:

              sf = state_file(repo)
              old_tag = sf.read_text().strip() if sf.exists() else ""

              try:
                  rel = get_latest_release(repo)
              except Exception as e:
                  print(repo,"error:",e)
                  continue

              new_tag = rel.get("tag_name","")

              if not new_tag or new_tag == old_tag:
                  continue

              title=f"[Release] {repo} {new_tag}"

              desp=f"""仓库: {repo}

          Tag: {new_tag}

          Release:
          {rel.get("html_url","")}
          """

              try:
                  send_serverchan3(title,desp)
                  sf.write_text(new_tag)
                  updated=True
              except Exception as e:
                  print("push failed:",e)

          print("done",updated)
          PY

      - name: Commit state
        run: |
          if git diff --quiet .releases-watcher/serverchan3; then
            exit 0
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .releases-watcher/serverchan3
          git commit -m "update serverchan3 release states"
          git push
