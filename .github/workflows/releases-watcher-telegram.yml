name: Releases Watcher - Telegram

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  releases-watcher-telegram:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare state directory
        run: |
          mkdir -p .releases-watcher/telegram

      - name: Check releases and notify Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python - <<'PY'
          import json,os,pathlib,urllib.request,urllib.parse,html

          REPO_FILE=pathlib.Path("releases-watcher/repos.json")
          STATE_DIR=pathlib.Path(".releases-watcher/telegram")
          STATE_DIR.mkdir(parents=True,exist_ok=True)

          TG_BOT_TOKEN=os.environ["TG_BOT_TOKEN"]
          TG_CHAT_ID=os.environ["TG_CHAT_ID"]

          def load_repos():
              return json.loads(REPO_FILE.read_text())

          def github(url):
              req=urllib.request.Request(url,headers={"User-Agent":"releases-watcher"})
              return json.loads(urllib.request.urlopen(req).read())

          def latest(repo):
              owner,name=repo.split("/",1)
              return github(f"https://api.github.com/repos/{owner}/{name}/releases/latest")

          def telegram(text):
              url=f"https://api.telegram.org/bot{TG_BOT_TOKEN}/sendMessage"
              data=urllib.parse.urlencode({
                  "chat_id":TG_CHAT_ID,
                  "text":text,
                  "parse_mode":"HTML"
              }).encode()

              urllib.request.urlopen(url,data)

          def state(repo):
              return STATE_DIR/f"{repo.replace('/','__')}.txt"

          for repo in load_repos():

              sf=state(repo)
              old=sf.read_text().strip() if sf.exists() else ""

              try:
                  rel=latest(repo)
              except:
                  continue

              tag=rel.get("tag_name","")

              if not tag or tag==old:
                  continue

              text=(
                  f"<b>Release Update</b>\n"
                  f"<b>{html.escape(repo)}</b>\n"
                  f"Tag: {html.escape(tag)}\n"
                  f"<a href='{rel.get('html_url','')}'>Open Release</a>"
              )

              try:
                  telegram(text)
                  sf.write_text(tag)
              except Exception as e:
                  print(e)
          PY

      - name: Commit state
        run: |
          if git diff --quiet .releases-watcher/telegram; then
            exit 0
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .releases-watcher/telegram
          git commit -m "update telegram release states"
          git push
