name: Releases Watcher - Telegram

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: releases-watcher-telegram
  cancel-in-progress: false

jobs:
  releases-watcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: mkdir -p .releases-watcher/telegram

      - name: Run watcher
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: python releases-watcher/telegram_watcher.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .releases-watcher/telegram

          if git diff --cached --quiet; then
            echo "No state changes"
            exit 0
          fi

          git commit -m "update release states"
          git push
