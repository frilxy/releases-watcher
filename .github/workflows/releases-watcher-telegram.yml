name: Releases Watcher - Telegram

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  releases-watcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: mkdir -p .releases-watcher/telegram

      - name: Run watcher
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: python releases-watcher/telegram_watcher.py

      - name: Commit state
        run: |
          if git diff --quiet -- .releases-watcher/telegram; then
            echo "No changes"
            exit 0
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .releases-watcher/telegram
          git commit -m "update release states"
          git push
