name: Releases Watcher - Telegram

on:
  schedule:
    - cron: "*/30 * * * *"   # 每30分钟执行
  workflow_dispatch:

jobs:
  releases-watcher-telegram:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare state directory
        run: mkdir -p .releases-watcher/telegram

      - name: Check releases and notify Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request
          import urllib.parse
          import urllib.error
          import html

          REPO_FILE = pathlib.Path("releases-watcher/repos.json")
          STATE_DIR = pathlib.Path(".releases-watcher/telegram")
          STATE_DIR.mkdir(parents=True, exist_ok=True)

          TG_BOT_TOKEN = os.environ["TG_BOT_TOKEN"].strip()
          TG_CHAT_ID = os.environ["TG_CHAT_ID"].strip()
          IS_MANUAL = os.environ["IS_MANUAL"] == "true"

          GITHUB_HEADERS = {
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "releases-watcher"
          }

          def load_repos():
              data = json.loads(REPO_FILE.read_text(encoding="utf-8"))
              repos = []
              for item in data:
                  item = str(item).strip()
                  if item and "/" in item:
                      repos.append(item)
              return repos

          def get_json(url, headers=None, timeout=30):
              req = urllib.request.Request(url, headers=headers or {})
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def get_latest_release(repo):
              owner, name = repo.split("/", 1)
              url = f"https://api.github.com/repos/{owner}/{name}/releases/latest"
              return get_json(url, headers=GITHUB_HEADERS)

          def send_telegram(text):
              url = f"https://api.telegram.org/bot{TG_BOT_TOKEN}/sendMessage"

              data = urllib.parse.urlencode({
                  "chat_id": TG_CHAT_ID,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": "true"
              }).encode()

              req = urllib.request.Request(
                  url,
                  data=data,
                  method="POST",
                  headers={
                      "Content-Type": "application/x-www-form-urlencoded",
                      "User-Agent": "releases-watcher"
                  }
              )

              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      result = resp.read().decode()
                      print("Telegram returned:", result)
                      return True
              except urllib.error.HTTPError as e:
                  print("Telegram error:", e.read().decode())
                  return False
              except Exception as e:
                  print("Telegram failed:", e)
                  return False

          def state_file(repo):
              return STATE_DIR / f"{repo.replace('/','__')}.txt"

          repos = load_repos()
          notified = 0

          for repo in repos:

              sf = state_file(repo)
              old_tag = sf.read_text().strip() if sf.exists() else ""

              try:
                  rel = get_latest_release(repo)
              except Exception as e:
                  print(repo,"release fetch failed:",e)
                  continue

              new_tag = (rel.get("tag_name") or "").strip()
              name = (rel.get("name") or new_tag).strip()
              url = (rel.get("html_url") or "").strip()

              if not new_tag:
                  continue

              # 首次监控
              if not sf.exists():

                  text = (
                      f"<b>GitHub Release</b>\n"
                      f"<b>Repo:</b> {html.escape(repo)}\n"
                      f"<b>Tag:</b> {html.escape(new_tag)}\n"
                      f"<b>Status:</b> first notification\n"
                      f"<a href='{url}'>Open Release</a>"
                  )

                  if send_telegram(text):
                      sf.write_text(new_tag)
                      notified += 1

                  continue

              # 已推送过
              if new_tag == old_tag:
                  continue

              # 有新版本
              text = (
                  f"<b>GitHub Release Update</b>\n"
                  f"<b>Repo:</b> {html.escape(repo)}\n"
                  f"<b>Name:</b> {html.escape(name)}\n"
                  f"<b>Tag:</b> {html.escape(new_tag)}\n"
                  f"<
