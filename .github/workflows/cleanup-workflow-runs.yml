name: Cleanup Workflow Runs

on:
  schedule:
    # 每天凌晨 3:15（UTC）运行一次
    - cron: "15 19 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP_LATEST: "20"
        run: |
          python - <<'PY'
          import os
          import requests

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          keep_latest = int(os.environ.get("KEEP_LATEST", "20"))

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          runs = []
          page = 1

          while True:
              url = f"https://api.github.com/repos/{repo}/actions/runs?per_page=100&page={page}"
              resp = requests.get(url, headers=headers, timeout=30)
              resp.raise_for_status()
              data = resp.json()
              page_runs = data.get("workflow_runs", [])
              if not page_runs:
                  break
              runs.extend(page_runs)
              if len(page_runs) < 100:
                  break
              page += 1

          # 按创建时间倒序，保留最新 KEEP_LATEST 条
          runs.sort(key=lambda x: x["created_at"], reverse=True)
          to_delete = runs[keep_latest:]

          print(f"Total runs: {len(runs)}")
          print(f"Keeping latest: {keep_latest}")
          print(f"Deleting: {len(to_delete)}")

          for run in to_delete:
              run_id = run["id"]
              del_url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}"
              del_resp = requests.delete(del_url, headers=headers, timeout=30)
              if del_resp.status_code not in (204, 202):
                  print(f"Failed to delete run {run_id}: {del_resp.status_code} {del_resp.text}")
              else:
                  print(f"Deleted run {run_id}")
          PY
